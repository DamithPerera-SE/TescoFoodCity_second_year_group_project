<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Order | Tesco Food City</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background:#f8f9fa; display:flex; flex-direction:column; min-height:100vh; font-family:'Poppins',sans-serif; }
    main { flex:1; display:flex; justify-content:center; align-items:center; padding:20px; }
    .verify-container { background:#fff; padding:40px 30px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); width:100%; max-width:400px; text-align:center; }
    .btn-success { background-color:#2e7d32; border:none; }
    .btn-success:hover { background-color:#256428; }
</style>
</head>
<body>
<main>
    <div class="verify-container">
        <!-- LOGO -->
        <div class="logo text-center mb-3">
            <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Tesco Food City" width="120">
        </div>

        <h2>Verify Your Order</h2>
        <p>A verification code has been sent to <b>{{ email }}</b>. Enter it below to confirm your order.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <input type="text" class="form-control" name="code" placeholder="6-digit code" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Confirm Order</button>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
