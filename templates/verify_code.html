<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Verification - Tesco Food City</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#f8f9fa;
font-family:'Poppins',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.verify-container{
background:#fff;
padding:40px 30px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
width:100%;
max-width:420px;
text-align:center;
}

.verify-container:hover{
box-shadow:0 6px 25px rgba(0,0,0,0.15);
}

h2{
color:#28a745;
font-weight:600;
margin-bottom:20px;
}

.timer{
font-size:14px;
color:#dc3545;
font-weight:500;
margin-bottom:10px;
}

.btn-success{
background-color:#2e7d32;
border:none;
}

.btn-success:hover{
background-color:#256428;
}

.logo img{
height:65px;
}

</style>
</head>

<body>

<div class="verify-container">

<!-- LOGO -->
<div class="logo text-center mb-3">
<img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Tesco Food City">
</div>

<h2>
<i class="fa-solid fa-envelope me-2"></i>
Verify Your Email
</h2>

<!-- TIMER -->
<div class="timer">
Code expires in <span id="countdown">02:00</span>
</div>

<!-- Flash messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="alert alert-{{ category }} alert-dismissible fade show">
{{ message }}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('verify_code') }}">

<div class="mb-3">
<label class="form-label">Enter Verification Code</label>
<input type="text" class="form-control text-center" name="code" placeholder="6-digit code" required>
</div>

<button type="submit" class="btn btn-success w-100">
<i class="fa-solid fa-check me-2"></i>
Verify Email
</button>

</form>

<p class="mt-3">
Didn't receive a code?
<a id="resendLink" href="{{ url_for('register') }}" class="text-success fw-semibold disabled">Resend</a>
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* OTP Countdown Timer */

let time = 120;
let countdown = document.getElementById("countdown");
let resend = document.getElementById("resendLink");

let timer = setInterval(function(){

let minutes = Math.floor(time / 60);
let seconds = time % 60;

seconds = seconds < 10 ? "0"+seconds : seconds;

countdown.innerHTML = minutes + ":" + seconds;

time--;

if(time < 0){

clearInterval(timer);

countdown.innerHTML = "Expired";

resend.classList.remove("disabled");

}

},1000);

</script>

</body>
</html>
